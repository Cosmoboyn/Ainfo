<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AInfo Platform - Chess Update</title>
    <style>
        :root {
            --bg-main: #5c82b1;       
            --bg-panel: #cccccc;      
            --text-main: #000000;     
            --border-color: #000000;  
            --btn-active: #a6e3a1;  
            --msg-user: #a3c2e0;
            --msg-ai: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-main: #1a1b26;       
            --bg-panel: #242530;      
            --text-main: #ffffff;     
            --border-color: #444444;  
            --btn-active: #303446;  
            --msg-user: #3d59a1;
            --msg-ai: #414868;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .window-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            gap: 15px;
        }

        .left-panel {
            flex: 3;
            background-color: var(--bg-panel);
            border: 3px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 70px;
        }

        .msg {
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            max-width: 75%;
            word-break: break-word;
            font-size: 1.1rem;
            white-space: pre-line;
        }
        .user-msg { align-self: flex-end; background-color: var(--msg-user); }
        .ai-msg { align-self: flex-start; background-color: var(--msg-ai); }
        .system-msg { align-self: center; border-style: dashed; font-size: 0.9rem; text-align: center; width: 100%; }

        .input-container {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            border: 3px solid var(--border-color);
            background: transparent;
        }

        .input-container input {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--text-main);
            outline: none;
        }

        .send-btn {
            background: transparent;
            border: none;
            border-left: 3px solid var(--border-color);
            padding: 0 25px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
        }
        .send-btn:hover { background-color: rgba(0,0,0,0.1); }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 280px;
        }

        .info-top {
            background-color: var(--bg-panel);
            border: 3px solid var(--border-color);
            padding: 20px;
            position: relative;
            flex: 2;
        }

        .beta-label { position: absolute; top: 10px; right: 80px; font-size: 0.9rem; }
        .brand-title { font-size: 3rem; font-weight: bold; margin-top: 5px; }

        .window-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ctrl-btn {
            width: 35px;
            height: 35px;
            background: transparent;
            border: 2px solid var(--border-color);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ctrl-btn:hover { background-color: rgba(0,0,0,0.1); }

        /* Кнопка ИГРЫ теперь СВЕТИТСЯ и КЛИКАБЕЛЬНА */
        .games-btn {
            background-color: #a6e3a1;
            border: 3px solid var(--border-color);
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }
        .games-btn:active { transform: scale(0.95); }

        .info-bottom {
            background-color: var(--bg-panel);
            border: 3px solid var(--border-color);
            padding: 20px;
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-header { font-size: 1.6rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="window-wrapper">
    <div class="left-panel">
        <div class="chat-box" id="chatBox">
            <div class="msg system-msg">[Система]: Шахматное ядро AInfo успешно интегрировано! Кнопка Игры активна.</div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ввод (или сделай ход)..." onkeypress="checkEnter(event)">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="info-top">
            <div class="beta-label">Beta v2</div>
            <div class="brand-title">AInfo</div>
            <div class="window-controls">
                <button class="ctrl-btn" onclick="toggleTheme()">⋮</button>
                <button class="ctrl-btn" onclick="alert('AInfo Chess Edition. Доступны шахматные модули!')">i</button>
            </div>
        </div>

        <button class="games-btn" onclick="activateChessMode()">Игры</button>

        <div class="info-bottom">
            <div class="status-header" id="statMemory">Память: --</div>
            <div class="status-header" id="statCore">Ядро: Старт</div>
        </div>
    </div>
</div>

<script>
    let brain = JSON.parse(localStorage.getItem('ai_brain')) || {
        "привет": {"Привет! Я твое создание. Научи меня чему-нибудь.": 1.0},
        "кто ты": {"Я развивающийся цифровой организм AInfo. Мой разум чист.": 1.0}
    };
    
    let learningRate = 0.2;
    let currentTrigger = null;
    let currentResponse = null;
    let awaitingHint = false;
    
    // Переменные для режима шахмат
    let chessMode = false;
    let currentPuzzleAnswer = null;

    // Шахматная база данных AInfo
    const chessDatabase = {
        players: {
            "магнус карлсен": "Магнус Карлсен (Норвегия) — 16-й чемпион мира. Считается одним из величайших игроков в истории. В 2026 году продолжает удерживать статус короля мирового блица!",
            "хикару накамура": "Хикару Накамура (США) — гроссмейстер, супер-эксперт в пулю и блиц, а также один из самых популярных шахматных стримеров на планете.",
            "гарри каспаров": "Гарри Каспаров — 13-й чемпион мира, легенда шахмат. Много лет удерживал рекордный рейтинг, пока его не побил Магнус Карлсен.",
            "ян непомнящий": "Ян Непомнящий — сильнейший российский гроссмейстер, дважды выигрывал Турниры претендентов."
        },
        news: [
            "⚡ [Новости 2026]: Завершен супертурнир в Вейк-ан-Зее! Молодые таланты теснят ветеранов, а точность анализа партий с помощью нейросетей достигла рекордных 99.8%.",
            "⚡ [Новости 2026]: Фиде тестирует новые правила контроля времени для борьбы с компьютерными подсказками на живых турнирах."
        ],
        puzzles: [
            { q: "🧩 Задача №1 (Мат в 1 ход):\nБелые: Ладья h1, Король g1\nЧерные: Король h8, Пешка h7\n\nТвой ход белой Ладьей? (Напиши поле, например: h1-h8)", a: "h1-h8" },
            { q: "🧩 Задача №2 (Выигрыш фигуры):\nБелые: Ферзь d1, Слон b5\nЧерные: Король e8, Ферзь a5 (сделал шах слону!)\n\nКак белым защититься и одновременно забрать черного Ферзя? (Варианты: Ферзем или Пешкой?)", a: "ферзем" }
        ]
    };

    function toggleTheme() {
        const html = document.documentElement;
        html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function updateLiveStats(coreStatus) {
        document.getElementById('statMemory').innerText = `Память: ${Object.keys(brain).length} связей`;
        if (coreStatus) document.getElementById('statCore').innerText = `Ядро: ${coreStatus}`;
    }

    function saveBrain() {
        localStorage.setItem('ai_brain', JSON.stringify(brain));
        updateLiveStats();
    }

    function appendMessage(text, className) {
        let chatBox = document.getElementById('chatBox');
        let msgDiv = document.createElement('div');
        msgDiv.className = `msg ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function checkEnter(event) { if (event.key === 'Enter') sendMessage(); }

    // АКТИВАЦИЯ ИГР КНОПКОЙ
    function activateChessMode() {
        chessMode = true;
        updateLiveStats("Шахматы");
        appendMessage("🤖 AInfo: Шахматный режим активирован!\n\nДоступные команды:\n• Напиши 'задача' — чтобы решать головоломки.\n• Напиши 'новости' — чтобы узнать сводку дня.\n• Напиши имя игрока (например, 'Магнус Карлсен') чтобы проверить мои знания.\n• Напиши ход (например, 'e2-e4') — начнется игра вслепую!", "ai-msg");
    }

    function sendMessage() {
        let inputEl = document.getElementById('userInput');
        let text = inputEl.value.trim();
        if (!text) return;

        appendMessage(text, 'user-msg');
        inputEl.value = '';

        let lowerText = text.toLowerCase();

        // Проверка ответа на шахматную задачу
        if (currentPuzzleAnswer) {
            if (lowerText.includes(currentPuzzleAnswer)) {
                appendMessage("🤖 AInfo: Блестяще! Это абсолютно верное решение. Анализ подтверждает мат! 👍", "ai-msg");
            } else {
                appendMessage(`🤖 AInfo: Не совсем так. Попробуй еще раз или изучи доску внимательнее!`, "ai-msg");
            }
            currentPuzzleAnswer = null;
            return;
        }

        // ШАХМАТНАЯ ЛОГИКА (Если включен режим или юзер спросил про шахматы)
        if (chessMode || lowerText.includes("шахмат") || lowerText.includes("магнус") || lowerText.includes("задача")) {
            
            // 1. Новости
            if (lowerText.includes("новост")) {
                let randomNews = chessDatabase.news[Math.floor(Math.random() * chessDatabase.news.length)];
                appendMessage(`🤖 AInfo: ${randomNews}`, "ai-msg");
                return;
            }
            
            // 2. Задачи
            if (lowerText.includes("задач")) {
                let puzzle = chessDatabase.puzzles[Math.floor(Math.random() * chessDatabase.puzzles.length)];
                currentPuzzleAnswer = puzzle.a;
                appendMessage(`🤖 AInfo:\n${puzzle.q}`, "ai-msg");
                updateLiveStats("Анализ задач");
                return;
            }

            // 3. Известные игроки
            for (let player in chessDatabase.players) {
                if (lowerText.includes(player)) {
                    appendMessage(`🤖 AInfo: ${chessDatabase.players[player]}`, "ai-msg");
                    return;
                }
            }

            // 4. Игра вслепую (имитация ходов и анализа)
            let moveMatch = text.match(/([a-h][1-8])\s*[-x]?\s*([a-h][1-8])/i);
            if (moveMatch) {
                let userMove = moveMatch[0];
                let aiResponseMoves = ["g1-f3", "e7-e5", "b8-c6", "d2-d4"];
                let randomAiMove = aiResponseMoves[Math.floor(Math.random() * aiResponseMoves.length)];
                
                setTimeout(() => {
                    appendMessage(`🤖 AInfo: Принято. Твой ход: ${userMove}.\n[Анализ Ядра]: Позиция стабильная. Мой ответный ход вслепую: ${randomAiMove}! Твой черед.`, "ai-msg");
                    updateLiveStats("Игра");
                }, 400);
                return;
            }
        }

        // Стандартная Ассоциативная память (если это не шахматный запрос)
        if (awaitingHint) {
            if (currentTrigger) {
                if (!brain[currentTrigger]) brain[currentTrigger] = {};
                brain[currentTrigger][text] = 1.2;
                saveBrain();
                appendMessage(`[Система]: Ответ усвоен.`, 'system-msg');
            } else {
                let lastQ = localStorage.getItem('last_unknown_phrase');
                if (lastQ) {
                    brain[lastQ.toLowerCase().replace(/[?!.,]/g, "").trim()] = { [text]: 1.0 };
                    saveBrain();
                    appendMessage(`[Система]: Новая связь сформирована.`, 'system-msg');
                }
            }
            awaitingHint = false;
            currentTrigger = null;
            return;
        }

        // Поиск по триггерам
        let words = lowerText.replace(/[?!.,]/g, "").trim().split(/\s+/);
        let bestTrigger = null;
        let maxScore = 0;
        for (let trigger in brain) {
            let tWords = trigger.split(/\s+/);
            let score = words.filter(x => tWords.includes(x)).length;
            if (score > maxScore) { maxScore = score; bestTrigger = trigger; }
        }

        if (bestTrigger && Object.keys(brain[bestTrigger]).length > 0) {
            let responses = brain[bestTrigger];
            let bestRes = Object.keys(responses).reduce((a, b) => responses[a] > responses[b] ? a : b);
            currentTrigger = bestTrigger; currentResponse = bestRes;
            setTimeout(() => {
                appendMessage(`AInfo: ${bestRes}`, 'ai-msg');
                updateLiveStats("Память");
                appendMessage("[Система]: Отправь '+' для согласия или '-' для исправления.", 'system-msg');
            }, 300);
            return;
        }

        if (text === '+' && currentTrigger) {
            brain[currentTrigger][currentResponse] += learningRate; saveBrain();
            appendMessage("[Система]: Связь укреплена.", 'system-msg');
            return;
        } else if (text === '-' && currentTrigger) {
            brain[currentTrigger][currentResponse] -= learningRate;
            if (brain[currentTrigger][currentResponse] <= 0) delete brain[currentTrigger][currentResponse];
            saveBrain();
            appendMessage("[Система]: Исправление. Введи правильный ответ:", 'system-msg');
            awaitingHint = true; return;
        }

        // Проверка математики
        let mathMatch = text.match(/(\d+)\s*([\+\-])\s*(\d+)/);
        if (mathMatch) {
            let n1 = parseInt(mathMatch[1]), op = mathMatch[2], n2 = parseInt(mathMatch[3]);
            let res = op === '+' ? n1 + n2 : n1 - n2;
            setTimeout(() => { appendMessage(`AInfo (Вычислено): ${n1} ${op} ${n2} = ${res}`, 'ai-msg'); updateLiveStats("Вычисления"); }, 300);
            return;
        }

        // Неизвестная фраза
        setTimeout(() => {
            appendMessage(`AInfo: Неизвестный триггер. Что мне ответить?`, 'ai-msg');
            localStorage.setItem('last_unknown_phrase', text);
            awaitingHint = true; currentTrigger = null;
        }, 300);
    }

    updateLiveStats("Готов");
</script>
</body>
</html>
